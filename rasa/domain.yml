version: "3.1"

intents:
  - greet
  - goodbye 
  - ask_pizza
  - ask_pizza_types

entities:
  - pizza_type
  - pizza_quantity

slots:
  selected_pizza:
    type: categorical
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: pizza_type
    values:
      - cheese
      - pepperoni
      - margherita
      - hawaiian
      - vegetarian
      - vegan
      - gluten-free
      - bbq-chicken
      - buffalo-chicken
  pizza_quantity:
    type: float
    initial_value: 1
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: pizza_quantity

responses:
  utter_greet:
  - text: "Hello! I can help you order a pizza. We have these pizza types: cheese, pepperoni, margherita, hawaiian, vegetarian, vegan, gluten-free, bbq-chicken, and buffalo-chicken."

  utter_goodbye:
  - text: "Bye, thanks for using the pizza ordering service."

  utter_pizza_types:
  - text: "We have these pizza types: cheese, pepperoni, margherita, hawaiian, vegetarian, vegan, gluten-free, bbq-chicken, and buffalo-chicken."

actions:
  - action_confirm_pizza_order

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
